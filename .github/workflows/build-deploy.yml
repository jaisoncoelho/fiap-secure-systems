          kubectl rollout restart deployment/upload-service -n fiap-secure-systems
          kubectl rollout restart deployment/processing-service -n fiap-secure-systems
          kubectl rollout restart deployment/report-service -n fiap-secure-systems

      - name: Wait for rollout
