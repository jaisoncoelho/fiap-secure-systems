apiVersion: apps/v1
kind: Deployment
metadata:
  name: report-service
  namespace: fiap-secure-systems
spec:
  replicas: 1
  selector:
    matchLabels:
      app: report-service
  template:
    metadata:
      labels:
        app: report-service
    spec:
      imagePullSecrets:
        - name: github-registry-secret
      containers:
        - name: report-service
          image: ghcr.io/jaisoncoelho/fiap-secure-systems-report-service:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 3003
          env:
            - name: NODE_ENV
              value: 'production'
            - name: REPORT_SERVICE_PORT
              value: '3003'
            - name: POSTGRES_HOST
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: postgres-host
            - name: POSTGRES_PORT
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: postgres-port
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: postgres-user
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: postgres-password
            - name: POSTGRES_DB
              value: 'fiap_report'
            - name: RABBITMQ_URL
              valueFrom:
                secretKeyRef:
                  name: rabbitmq-secret
                  key: rabbitmq-url
---
apiVersion: v1
kind: Service
metadata:
  name: report-service
  namespace: fiap-secure-systems
spec:
  selector:
    app: report-service
  ports:
    - name: http
      port: 3003
      targetPort: 3003
      protocol: TCP
  type: ClusterIP
