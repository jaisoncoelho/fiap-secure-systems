            --from-literal=openai-api-key="${{ secrets.OPENAI_API_KEY }}" \
            --from-literal=openai-model="${{ vars.OPENAI_MODEL }}" \
            --from-literal=openai-timeout-ms="${{ vars.OPENAI_TIMEOUT_MS }}" \
            --from-literal=openai-max-retries="${{ vars.OPENAI_MAX_RETRIES }}" \
            --namespace=fiap-secure-systems \
