          kubectl rollout status deployment/upload-service -n fiap-secure-systems --timeout=300s
          kubectl rollout status deployment/processing-service -n fiap-secure-systems --timeout=300s
          kubectl rollout status deployment/report-service -n fiap-secure-systems --timeout=300s

      - name: Verify deployment health
        run: |
          export KUBECONFIG=$(pwd)/kubeconfig
          echo "=== Checking deployments ==="
          kubectl get deployments -n fiap-secure-systems -o wide

          echo "=== Checking pods ==="
          kubectl get pods -n fiap-secure-systems -o wide

          echo "=== Checking services ==="
          kubectl get svc -n fiap-secure-systems

          echo "=== Checking ingress ==="
          kubectl get ingress -n fiap-secure-systems

          echo "=== Recent events ==="
          kubectl get events -n fiap-secure-systems --sort-by='.lastTimestamp' | tail -10
