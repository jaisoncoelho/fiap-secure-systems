apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: fiap-secure-systems
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
    spec:
      imagePullSecrets:
        - name: github-registry-secret
      containers:
        - name: api-gateway
          image: ghcr.io/jaisoncoelho/fiap-secure-systems-api-gateway:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
          env:
            - name: NODE_ENV
              value: 'production'
            - name: API_GATEWAY_PORT
              value: '3000'
            - name: UPLOAD_SERVICE_URL
              value: 'http://upload-service.fiap-secure-systems.svc.cluster.local:3001'
            - name: REPORT_SERVICE_URL
              value: 'http://report-service.fiap-secure-systems.svc.cluster.local:3003'
            - name: API_KEY
              valueFrom:
                secretKeyRef:
                  name: app-secret
                  key: api-key
---
apiVersion: v1
kind: Service
metadata:
  name: api-gateway
  namespace: fiap-secure-systems
spec:
  selector:
    app: api-gateway
  ports:
    - name: http
      port: 80
      targetPort: 3000
      protocol: TCP
  type: ClusterIP
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: api-gateway-ingress
  namespace: fiap-secure-systems
  annotations:
    kubernetes.io/ingress.class: traefik
    traefik.ingress.kubernetes.io/router.entrypoints: web
spec:
  rules:
    - http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: api-gateway
                port:
                  number: 80
